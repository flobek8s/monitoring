kube-prometheus-stack:
  # ── Grafana ──────────────────────────────────────────────
  grafana:
    grafana.ini:
      server:
        root_url: https://grafana.flobek8s.com
      auth.anonymous:
        enabled: false

    enabled: true
    adminPassword: ""
    admin:
      existingSecret: grafana-admin-secret
      userKey: admin-user
      passwordKey: admin-password

    persistence:
      enabled: true
      type: pvc
      storageClassName: nfs-csi-monitoring
      accessModes:
        - ReadWriteMany
      size: 10Gi

    ingress:
      enabled: false 

    sidecar:
      dashboards:
        enabled: true

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: nfs-csi-monitoring
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      # pick up ServiceMonitors from all namespaces
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector: {}
      serviceMonitorNamespaceSelector: {}
      podMonitorSelector: {}
      podMonitorNamespaceSelector: {}

    ingress:
      enabled: false

  # ── Alertmanager ─────────────────────────────────────────
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: nfs-csi-monitoring
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi
    ingress:
      enabled: false

  # ── Node Exporter ─────────────────────────────────────────
  nodeExporter:
    enabled: true

  # ── kube-state-metrics ───────────────────────────────────
  kubeStateMetrics:
    enabled: true

  # ── Talos-specific: some internal kubelets use self-signed certs
  kubelet:
    serviceMonitor:
      https: true
      insecureSkipVerify: true

  kubeControllerManager:
    enabled: false             # Talos: not exposed by default
  kubeScheduler:
    enabled: false             # Talos: not exposed by default
  kubeEtcd:
    enabled: false             # Talos: managed internally
  kubeProxy:
    enabled: false             # Talos: uses kube-router / Cilium typically